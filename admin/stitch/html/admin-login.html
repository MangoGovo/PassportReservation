<body class="min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed for Login screen as per UX guidelines, but we keep the minimal logo anchor) -->
<nav class="absolute top-0 left-0 w-full z-20 flex justify-between items-center px-inline-padding h-component-height-md">
<div class="font-headline-md text-headline-md font-bold text-white opacity-90">
            Academic Secure Pass
        </div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-white cursor-pointer hover:opacity-70 transition-opacity">help_outline</span>
<span class="material-symbols-outlined text-white cursor-pointer hover:opacity-70 transition-opacity">dark_mode</span>
</div>
</nav>
<!-- Main Content Area -->
<main class="relative flex-grow flex items-center justify-center overflow-hidden">
<!-- Dynamic Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Campus Background" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXp_3678Y_caGlmpbk_HE6mgag4JYsNm8ZrxXQwcdBocIFaSWlDhP16ZRGmtrnmq1KOgnnzRMs61LEHcvE0xOXffeHu_Ph-nhakdawRuQrDzv9emKcXqvZ2EVgEpzlZ_Yzd6iJYR9piaaxqoiBCMz6lcLNwog_R3n_MFAwfIGmJxXw2pXMdjLmB3A2B3Mds77cn2eEBvu8AmFVULikVwF6AQnoLDE2wkK7crCm2HyhvugV6kVq46w_5soRtnfwFZcCpjYlxMXh1xs">

</div>
<!-- Login Card -->
<div class="relative z-10 w-full max-w-md px-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="bg-surface-container-lowest rounded-xl login-card overflow-hidden">
<div class="p-8 md:p-10">
<!-- Brand Section -->
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-full mb-4">
<span class="material-symbols-outlined text-white text-[32px]">shield_person</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">校园通行码预约管理系统</h1>
<p class="font-body-md text-body-md text-on-surface-variant">管理后台 · 安全访问控制</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Login Name -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider" for="username">Login Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-10 pr-4 h-12 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-body-md" id="username" placeholder="请输入管理员账号" type="text">
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 h-12 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-body-md" id="password" placeholder="请输入您的密码" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Utils -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary transition-all" type="checkbox">
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>

</div>
<!-- Action -->
<button class="w-full h-12 bg-primary text-white font-headline-md text-headline-md rounded-lg shadow-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="">登录</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>

</div>

</div>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }
        
        // Simple micro-interaction for button
        document.querySelector('button[type="submit"]').addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.97)';
        });
        document.querySelector('button[type="submit"]').addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });
    </script>

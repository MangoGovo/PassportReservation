server:
  port: 8080

spring:
  application:
    name: PassportReservationBackend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/passport_reservation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: 1800
  is-concurrent: true
  is-share: true
  is-log: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  security:
    sensitive-key: ${APP_SENSITIVE_KEY:0123456789abcdef0123456789abcdef}
    query-hash-salt: ${APP_QUERY_HASH_SALT:passport-reservation-dev}
    audit-hmac-key: ${APP_AUDIT_HMAC_KEY:passport-reservation-audit-dev}
    max-login-failures: 5
    lock-minutes: 30
    admin-password-expire-days: 90
